<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Pet Classifier 🐶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        /* 📤 Upload Area */
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .upload-box:hover {
            background: #e9ecef;
            border-color: #764ba2;
        }

        .upload-box.dragover {
            background: #e3f2fd;
            border-color: #2196f3;
        }

        input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* 🖼️ Preview */
        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 🔘 Button */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            display: none;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 📊 Result */
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result.cat {
            background: #ffe4e1;
            border: 2px solid #ff6b6b;
        }

        .result.dog {
            background: #e3f2fd;
            border: 2px solid #4ecdc4;
        }

        .result h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .confidence {
            font-size: 1.2em;
            color: #555;
        }

        /* ⏳ Loading */
        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 📱 Mobile Responsive */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Pet Classifier 🐶</h1>
        <p class="subtitle">Upload a photo and I'll tell if it's a Cat or Dog!</p>

        <!-- 📤 Upload Area -->
        <div class="upload-box" id="dropZone">
            <div class="upload-icon">📸</div>
            <p>Click to upload or drag & drop</p>
            <p style="color: #999; font-size: 0.9em;">Supports: JPG, PNG, WEBP</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- 🖼️ Preview -->
        <img id="preview" alt="Preview">

        <!-- ⏳ Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing with CNN...</p>
        </div>

        <!-- 🔘 Predict Button -->
        <button class="btn" id="predictBtn">🔍 Classify Pet</button>

        <!-- 📊 Result -->
        <div class="result" id="result">
            <h2 id="prediction"></h2>
            <p class="confidence" id="confidence"></p>
        </div>
    </div>

    <script>
        // 🎯 Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const predictBtn = document.getElementById('predictBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');

        // 📤 Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // 🖱️ Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        // 📁 File select
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // 🖼️ Handle File
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file!');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                predictBtn.style.display = 'inline-block';
                result.style.display = 'none';
                dropZone.style.display = 'none';
            };
            reader.readAsDataURL(file);

            // Store file for upload
            window.selectedFile = file;
        }

        // 🔍 Predict Button Click
        predictBtn.addEventListener('click', async () => {
            if (!window.selectedFile) return;

            // UI Update
            predictBtn.disabled = true;
            loading.style.display = 'block';
            predictBtn.style.display = 'none';

            // Prepare form data
            const formData = new FormData();
            formData.append('file', window.selectedFile);

            try {
                // 🌐 API Call to Python Backend
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                // 🎉 Show Result
                loading.style.display = 'none';
                result.style.display = 'block';
                
                // Cat or Dog styling
                const isCat = data.prediction.includes('Cat');
                result.className = 'result ' + (isCat ? 'cat' : 'dog');
                
                document.getElementById('prediction').textContent = data.prediction;
                document.getElementById('confidence').textContent = 
                    `Confidence: ${data.confidence}`;

            } catch (error) {
                alert('Error: ' + error.message);
                loading.style.display = 'none';
                predictBtn.disabled = false;
                predictBtn.style.display = 'inline-block';
            }
        });

        // 🔄 Reset on new upload
        preview.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
